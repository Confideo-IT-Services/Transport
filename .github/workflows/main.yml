name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Select branch to deploy'
        required: true
        type: choice
        options:
          - main
          - UAT

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 237343249019.dkr.ecr.ap-south-1.amazonaws.com
  ECS_CLUSTER: Conventpulse
  FRONTEND_ECR_REPO: allpulse/frontend
  BACKEND_ECR_REPO: allpulse/backend
  FRONTEND_SERVICE: allpulse-frontend-service
  BACKEND_SERVICE: allpulse-backend-service
  FRONTEND_TASK_DEFINITION: allpulse-frontend-task
  BACKEND_TASK_DEFINITION: allpulse-backend-task

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend
        run: |
          cd backend
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:${{ github.sha }} .
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:latest .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:latest

      - name: Build and push Frontend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:${{ github.sha }} .
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:latest .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:latest

      - name: Update Backend Task Definition
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ env.BACKEND_TASK_DEFINITION }} --region ${{ env.AWS_REGION }})
          
          # Extract the task definition JSON and update image
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:latest" '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn) | del(.revision) | del(.status) | del(.requiresAttributes) | del(.compatibilities) | del(.registeredAt) | del(.registeredBy)')
          
          # Register new task definition
          aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --region ${{ env.AWS_REGION }}

      - name: Update Frontend Task Definition
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ env.FRONTEND_TASK_DEFINITION }} --region ${{ env.AWS_REGION }})
          
          # Extract the task definition JSON and update image
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:latest" '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn) | del(.revision) | del(.status) | del(.requiresAttributes) | del(.compatibilities) | del(.registeredAt) | del(.registeredBy)')
          
          # Register new task definition
          aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --region ${{ env.AWS_REGION }}

      - name: Deploy Backend to ECS
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.BACKEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Deploy Frontend to ECS
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.FRONTEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Wait for Backend deployment
        run: |
          aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.BACKEND_SERVICE }} --region ${{ env.AWS_REGION }}

      - name: Wait for Frontend deployment
        run: |
          aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.FRONTEND_SERVICE }} --region ${{ env.AWS_REGION }}

      - name: Verify deployment
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Backend Service Status:"
          aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.BACKEND_SERVICE }} --region ${{ env.AWS_REGION }} --query 'services[0].deployments[0].{taskDefinition: taskDefinition, status: status, desiredCount: desiredCount, runningCount: runningCount}'
          echo "Frontend Service Status:"
          aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.FRONTEND_SERVICE }} --region ${{ env.AWS_REGION }} --query 'services[0].deployments[0].{taskDefinition: taskDefinition, status: status, desiredCount: desiredCount, runningCount: runningCount}'
