name: Deploy to AWS ECS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select branch to deploy"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - UAT
      environment:
        description: "Select environment (informational)"
        required: true
        type: choice
        options:
          - main UAT
      deploy_target:
        description: "What to build and deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend
          - rag

# Repository secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   ECR_REGISTRY, ECS_CLUSTER
#   BACKEND_ECR_REPO, BACKEND_SERVICE, BACKEND_TASK_DEFINITION, BACKEND_CONTAINER_NAME
#   FRONTEND_ECR_REPO, FRONTEND_SERVICE, FRONTEND_TASK_DEFINITION, FRONTEND_CONTAINER_NAME
#   RAG_ECR_REPO, RAG_SERVICE, RAG_TASK_DEFINITION, RAG_CONTAINER_NAME

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'backend'
        run: |
          cd backend
          docker build -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.BACKEND_ECR_REPO }}:${{ github.sha }} .
          docker tag ${{ secrets.ECR_REGISTRY }}/${{ secrets.BACKEND_ECR_REPO }}:${{ github.sha }} ${{ secrets.ECR_REGISTRY }}/${{ secrets.BACKEND_ECR_REPO }}:latest
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.BACKEND_ECR_REPO }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.BACKEND_ECR_REPO }}:latest

      - name: Build and push Frontend
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend'
        run: |
          docker build --no-cache -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.FRONTEND_ECR_REPO }}:${{ github.sha }} .
          docker tag ${{ secrets.ECR_REGISTRY }}/${{ secrets.FRONTEND_ECR_REPO }}:${{ github.sha }} ${{ secrets.ECR_REGISTRY }}/${{ secrets.FRONTEND_ECR_REPO }}:latest
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.FRONTEND_ECR_REPO }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.FRONTEND_ECR_REPO }}:latest

      - name: Build and push RAG
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'rag'
        run: |
          cd RAG_app
          docker build -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.RAG_ECR_REPO }}:${{ github.sha }} .
          docker tag ${{ secrets.ECR_REGISTRY }}/${{ secrets.RAG_ECR_REPO }}:${{ github.sha }} ${{ secrets.ECR_REGISTRY }}/${{ secrets.RAG_ECR_REPO }}:latest
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.RAG_ECR_REPO }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.RAG_ECR_REPO }}:latest

      - name: Download Backend Task Definition
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'backend'
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.BACKEND_TASK_DEFINITION }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'taskDefinition' > backend-task-def.json

          cat backend-task-def.json | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > backend-task-def-clean.json

      - name: Update Backend Task Definition Image
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'backend'
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def-clean.json
          container-name: ${{ secrets.BACKEND_CONTAINER_NAME }}
          image: ${{ secrets.ECR_REGISTRY }}/${{ secrets.BACKEND_ECR_REPO }}:latest

      - name: Deploy Backend to ECS
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'backend'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ secrets.BACKEND_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Download Frontend Task Definition
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend'
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.FRONTEND_TASK_DEFINITION }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'taskDefinition' > frontend-task-def.json

          cat frontend-task-def.json | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > frontend-task-def-clean.json

      - name: Update Frontend Task Definition Image
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend'
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def-clean.json
          container-name: ${{ secrets.FRONTEND_CONTAINER_NAME }}
          image: ${{ secrets.ECR_REGISTRY }}/${{ secrets.FRONTEND_ECR_REPO }}:latest

      - name: Deploy Frontend to ECS
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ secrets.FRONTEND_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Download RAG Task Definition
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'rag'
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.RAG_TASK_DEFINITION }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'taskDefinition' > rag-task-def.json

          cat rag-task-def.json | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > rag-task-def-clean.json

      - name: Update RAG Task Definition Image
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'rag'
        id: render-rag
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: rag-task-def-clean.json
          container-name: ${{ secrets.RAG_CONTAINER_NAME }}
          image: ${{ secrets.ECR_REGISTRY }}/${{ secrets.RAG_ECR_REPO }}:latest

      - name: Deploy RAG to ECS
        if: github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'rag'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-rag.outputs.task-definition }}
          service: ${{ secrets.RAG_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment Success
        run: |
          echo "Deployment completed successfully."
          echo "Branch: ${{ github.event.inputs.branch }}"
          echo "Target: ${{ github.event.inputs.deploy_target }}"
          echo "Commit SHA: ${{ github.sha }}"
