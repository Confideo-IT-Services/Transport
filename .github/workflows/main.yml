name: Deploy to AWS ECS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Select branch to deploy'
        required: true
        type: choice
        options:
          - main
          - UAT

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 237343249019.dkr.ecr.ap-south-1.amazonaws.com
  ECS_CLUSTER: Conventpulse
  FRONTEND_ECR_REPO: allpulse/frontend
  BACKEND_ECR_REPO: allpulse/backend
  FRONTEND_SERVICE: allpulse-frontend-service
  BACKEND_SERVICE: allpulse-backend-service
  FRONTEND_TASK_DEFINITION: allpulse-frontend
  BACKEND_TASK_DEFINITION: allpulse-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Display branch
        run: echo "Deploying branch - ${{ github.event.inputs.branch }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend
        run: |
          cd backend
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:${{ github.sha }} .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:${{ github.sha }}

      - name: Build and push Frontend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:${{ github.sha }} .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:${{ github.sha }}

      - name: Download and clean Backend task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.BACKEND_TASK_DEFINITION }} --query taskDefinition > backend-task-def-raw.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection)' backend-task-def-raw.json > backend-task-def.json

      - name: Update Backend task definition with new image
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: backend
          image: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:${{ github.sha }}

      - name: Deploy Backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Download and clean Frontend task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.FRONTEND_TASK_DEFINITION }} --query taskDefinition > frontend-task-def-raw.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection)' frontend-task-def-raw.json > frontend-task-def.json

      - name: Update Frontend task definition with new image
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name: frontend
          image: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:${{ github.sha }}

      - name: Deploy Frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
