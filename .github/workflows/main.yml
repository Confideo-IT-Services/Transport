name: Deploy to AWS ECS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Select branch to deploy'
        required: true
        type: choice
        options:
          - main
          - UAT
      deploy_frontend:
        description: 'Deploy Frontend'
        type: boolean
        default: true
      deploy_backend:
        description: 'Deploy Backend'
        type: boolean
        default: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 237343249019.dkr.ecr.ap-south-1.amazonaws.com
  ECS_CLUSTER: Conventpulse
  
  FRONTEND_ECR: 237343249019.dkr.ecr.ap-south-1.amazonaws.com/allpulse/frontend
  BACKEND_ECR: 237343249019.dkr.ecr.ap-south-1.amazonaws.com/allpulse/backend
  
  FRONTEND_SERVICE: allpulse-frontend-service
  BACKEND_SERVICE: allpulse-backend-service
  
  FRONTEND_TASK_FAMILY: allpulse-frontend
  BACKEND_TASK_FAMILY: allpulse-backend
  
  FRONTEND_CONTAINER: frontend
  BACKEND_CONTAINER: backend

jobs:
  deploy-backend:
    if: github.event.inputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Display branch
        run: echo "🚀 Deploying Backend from branch - ${{ github.event.inputs.branch }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: |
          docker build \
            -t $BACKEND_ECR:${{ github.sha }} \
            -t $BACKEND_ECR:latest \
            ./backend

      - name: Push Backend Image
        run: |
          docker push $BACKEND_ECR:${{ github.sha }}
          docker push $BACKEND_ECR:latest

      - name: Deploy Backend to ECS
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $BACKEND_TASK_FAMILY)
          
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$BACKEND_ECR:${{ github.sha }}" \
            '.taskDefinition
            | .containerDefinitions |=
              map(if .name=="'"$BACKEND_CONTAINER"'" then .image=$IMAGE else . end)
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy,
                .enableFaultInjection
              )')
          
          aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF"
          
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $BACKEND_SERVICE \
            --task-definition $BACKEND_TASK_FAMILY \
            --force-new-deployment
          
          echo "⏳ Waiting for Backend service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $BACKEND_SERVICE
          
          echo "✅ Backend deployed successfully!"

  deploy-frontend:
    if: github.event.inputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Display branch
        run: echo "🚀 Deploying Frontend from branch - ${{ github.event.inputs.branch }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Frontend Image
        run: |
          docker build \
            -t $FRONTEND_ECR:${{ github.sha }} \
            -t $FRONTEND_ECR:latest \
            .

      - name: Push Frontend Image
        run: |
          docker push $FRONTEND_ECR:${{ github.sha }}
          docker push $FRONTEND_ECR:latest

      - name: Deploy Frontend to ECS
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $FRONTEND_TASK_FAMILY)
          
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$FRONTEND_ECR:${{ github.sha }}" \
            '.taskDefinition
            | .containerDefinitions |=
              map(if .name=="'"$FRONTEND_CONTAINER"'" then .image=$IMAGE else . end)
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy,
                .enableFaultInjection
              )')
          
          aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF"
          
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE \
            --task-definition $FRONTEND_TASK_FAMILY \
            --force-new-deployment
          
          echo "⏳ Waiting for Frontend service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $FRONTEND_SERVICE
          
          echo "✅ Frontend deployed successfully!"
